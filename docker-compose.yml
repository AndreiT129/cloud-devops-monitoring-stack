services:
  app:
    build: ./app
    container_name: cloud-devops-app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: devopsdb
      DB_USER: devopsuser
      DB_PASSWORD: devopspass
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: cloud-devops-db
    environment:
      POSTGRES_DB: devopsdb
      POSTGRES_USER: devopsuser
      POSTGRES_PASSWORD: devopspass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: cloud-devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: cloud-devops-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data:
